name: Actualizar GeoJSON estaciones hidrométricas

on:
  schedule:
    - cron: "*/15 * * * *"  # Cada 15 minutos
  workflow_dispatch:  # Permite ejecutarlo manualmente desde GitHub

jobs:
  update-geojson:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Ejecutar script Python
        run: python update_geojson.py

      - name: Commit y push del GeoJSON actualizado
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add estaciones_pirineos_actuales.geojson
          git commit -m "Actualizar GeoJSON estaciones hidrométricas [Automático]" || echo "No hay cambios"
          git push